<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aakash Kumar — Data Scientist</title>
  <style>
    :root{
      --bg:#0f1115;            /* page background */
      --text:#e8edf3;          /* primary text */
      --muted:#b8c0cc;         /* secondary text */
      --icon:#cfd6de;          /* icon color */
      --avatar-bg:#bfc3cb;     /* gray circle behind photo */
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial; -webkit-font-smoothing:antialiased;}
    body{background:var(--bg); color:var(--text); display:grid; place-items:center;}

    .container{width:min(680px, 92vw); text-align:center;}

    /* Avatar */
    .avatar-wrap{width:260px; height:260px; margin:0 auto 22px; border-radius:999px; background:transparent; display:grid; place-items:center;}    
    .avatar{width:260px; height:260px; border-radius:999px; overflow:hidden;}
    .avatar img{width:100%; height:100%; object-fit:cover; display:block}

    h1{font-size:3rem; line-height:1.1; margin:8px 0 10px; letter-spacing:.2px; font-weight:600}
    .role{font-size:1.6rem; color:var(--muted); margin:0 0 26px}

    /* Icons */
    .icons{display:flex; gap:12px; justify-content:center; align-items:center; margin-top:6px}
    .icon{width:64px; height:64px; border-radius:16px; display:inline-flex; align-items:center; justify-content:center; color:#d1d5db; text-decoration:none; border:none; background:transparent; transition:transform .18s ease, color .18s ease, opacity .18s ease}
    .icon:hover{transform:translateY(-4px); color:#ffffff; opacity:1}
    .icon svg{width:36px; height:36px}

    @media (max-width:420px){
      .avatar-wrap{width:200px; height:200px}
      .avatar{width:176px; height:176px}
      h1{font-size:2.2rem}
      .role{font-size:1.2rem}
      .icon{width:48px; height:48px}
    }

    
    /* About button */
    .nav{
      position:fixed;
      top:20px;
      right:30px;
    }

    .nav a{
      color:white;
      text-decoration:none;
      font-size:14px;
    }
    /* Theme toggle button */
    .theme-toggle{position:fixed; bottom:20px; right:20px; width:56px; height:56px; border-radius:16px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center}
    .theme-toggle:hover{transform:translateY(-2px)}

    /* Light theme overrides */
    body.light{--bg:#f5f7fb; --text:#111827; --muted:#4b5563; --icon:#374151}
      /* LinkedIn icon color inversion */
    .linkedin svg .bg{fill:var(--li-bg)}
    .linkedin svg .fg{fill:var(--li-fg)}
    :root{--li-bg:#d1d5db; --li-fg:#0f1115}
    body.light{--li-bg:#111827; --li-fg:#ffffff}
      /* Square style for all icons (GitHub & Email like LinkedIn) */
    .github svg .bg, .email svg .bg{fill:var(--li-bg)}
    .github svg .fg, .email svg .fg{fill:var(--li-fg)}
      /* Toggle icon colors (same as other badges) */
    .theme-toggle svg .bg{fill:var(--li-bg)}
    .theme-toggle svg .fg{fill:var(--li-fg)}
    
    

    /* Email stroke styling */
    .email svg .fg{stroke:var(--li-fg); fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
    .social{width:32px;height:32px;fill:currentColor}
  .icon{color:#cfd6de;transition:.2s ease}
  .icon:hover{color:#ffffff;transform:translateY(-3px)}
  body.light .icon{color:#1f2937}
  body.light .icon:hover{color:#000}
  :root{--icon-bg:#e5e7eb;--icon-fg:#111827}
  body.light{--icon-bg:#111827;--icon-fg:#ffffff}
  .icon svg{width:36px;height:36px}
  .icon .bg{fill:var(--icon-bg)}
  .icon .fg{fill:var(--icon-fg);stroke:var(--icon-fg)}
</style>
</head>
<body>
  <!-- About link -->
<div class="nav">
  <a href="about.html">About</a>
</div>
  <main class="container">
    <div class="avatar-wrap">
      <div class="avatar"><img src="profile.jpg" alt="Aakash Kumar"></div>
    </div>
    <h1>Aakash Kumar</h1>
    <p class="role">Data Scientist</p>
<div class="icons">

  <!-- GitHub -->
  <a href="https://github.com/aakashkumar9/Machine-Learning-Projects" target="_blank" class="icon">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" fill="var(--icon-bg)"/>
      <path fill="var(--icon-fg)" d="M12 6.3c-3.2 0-5.8 2.6-5.8 5.8 0 2.6 1.7 4.8 4 5.6.3.1.4-.1.4-.3v-1c-1.6.4-2-.7-2-.7-.2-.6-.6-.8-.6-.8-.5-.3 0-.3 0-.3.6 0 .9.6.9.6.5.9 1.3.6 1.7.5.1-.4.2-.6.4-.8-1.3-.1-2.7-.6-2.7-2.9 0-.6.2-1.1.6-1.5-.1-.1-.3-.7.1-1.5 0 0 .5-.2 1.6.6.5-.1 1-.2 1.5-.2s1 .1 1.5.2c1.1-.8 1.6-.6 1.6-.6.4.8.2 1.4.1 1.5.4.4.6.9.6 1.5 0 2.3-1.4 2.8-2.7 2.9.2.2.4.6.4 1.2v1.8c0 .2.1.4.4.3 2.3-.8 4-3 4-5.6 0-3.2-2.6-5.8-5.8-5.8z"/>
    </svg>
  </a>

  <!-- LinkedIn -->
  <a href="https://linkedin.com/in/aakash-kumar09/" target="_blank" class="icon">
    <svg viewBox="0 0 24 24">
      <rect x="2" y="2" width="20" height="20" rx="4" fill="var(--icon-bg)"/>
      <circle cx="8" cy="9" r="1.3" fill="var(--icon-fg)"/>
      <rect x="7" y="11" width="2.2" height="6" fill="var(--icon-fg)"/>
      <path fill="var(--icon-fg)" d="M12 11h2.1v.9c.3-.6 1.1-1.2 2.2-1.2 2 0 2.7 1.3 2.7 3.2V17h-2.2v-2.8c0-1-.4-1.7-1.3-1.7-.7 0-1.2.5-1.4 1-.1.2-.1.4-.1.6V17H12z"/>
    </svg>
  </a>

  <!-- Email -->
  <a href="mailto:aakashkumar.aak09@gmail.com" class="icon">
    <svg viewBox="0 0 24 24">
      <rect x="2" y="5" width="20" height="14" rx="3" fill="var(--icon-bg)"/>
      <path d="M4 8l8 6 8-6" fill="none" stroke="var(--icon-fg)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>

</div>

  </main>
  <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
    <svg viewBox="0 0 24 24" width="36" height="36">
      <rect class="bg" x="1.5" y="1.5" width="21" height="21" rx="4"/>
      <circle class="fg" cx="12" cy="12" r="5"/>
      <path class="fg" d="M12 7a5 5 0 0 0 0 10a5 5 0 0 1 0-10z"/>
    </svg>
  </button>
  <script>
    const btn=document.getElementById('themeToggle');
    const saved=localStorage.getItem('theme');
    if(saved==='light'){document.body.classList.add('light');}
    btn.addEventListener('click',()=>{
      document.body.classList.toggle('light');
      localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark');
    });
  </script>
</body>
</html>
